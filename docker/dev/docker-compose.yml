volumes:
  postgres_data:
  dagster_home:
  arango_data:

networks:
  voz_net:
    driver: bridge
  traefik-public:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=300"]
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - voz_net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - ./pgadmin_servers.json:/pgadmin4/servers.json:ro
    networks:
      - voz_net
      - traefik-public
    depends_on:
      postgres:
        condition: service_healthy

  arangodb:
    image: arangodb:3.12.7
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD}
    volumes:
      - arango_data:/var/lib/arangodb3
    networks:
      - voz_net
    ports:
      - "8529:8529"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          arangosh
          --server.endpoint=tcp://127.0.0.1:8529
          --server.username=root
          --server.password=$$ARANGO_ROOT_PASSWORD
          --javascript.execute-string='db._version()'
          --quiet 2>/dev/null
      interval: 10s
      timeout: 10s
      retries: 5

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
    networks:
      - voz_net
    ports:
      - "8191:8191"

  user_code:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    image: voz-user-code:latest
    restart: unless-stopped
    env_file:
      - ./.env
    networks:
      - voz_net
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "dagster api grpc-health-check -h localhost -p 4000"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  dagster_webserver:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile.dagster-host
    image: voz-dagster-host:latest
    restart: unless-stopped
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "/dagster_home/workspace.yaml"]
    env_file:
      - ./.env
    volumes:
      - ./workspace.docker.yaml:/dagster_home/workspace.yaml:ro
      - ./dagster.docker.yaml:/dagster_home/dagster.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - voz_net
      - traefik-public
    depends_on:
      postgres:
        condition: service_healthy
      user_code:
        condition: service_healthy

  dagster_daemon:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile.dagster-host
    image: voz-dagster-host:latest
    restart: unless-stopped
    command: ["dagster-daemon", "run", "-w", "/dagster_home/workspace.yaml"]
    env_file:
      - ./.env
    environment:
      - DAGSTER_DAEMON_LOG_LEVEL=DEBUG
    volumes:
      - ./workspace.docker.yaml:/dagster_home/workspace.yaml:ro
      - ./dagster.docker.yaml:/dagster_home/dagster.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - voz_net
    depends_on:
      postgres:
        condition: service_healthy
      user_code:
        condition: service_healthy
