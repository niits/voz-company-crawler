  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8529/_api/version"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  neo4j:
    image: neo4j:5.26-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["genai"]'
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512m"
    volumes:
      - neo4j_data:/data
    networks:
      - voz_net
    ports:
      - "7474:7474"   # Browser UI  →  http://localhost:7474
      - "7687:7687"   # Bolt protocol
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
    networks:
      - voz_net
    ports:
      - "8191:8191"

  user_code:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    image: voz-user-code:latest
    restart: unless-stopped
    env_file:
      - ./.env
    networks:
      - voz_net
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "dagster api grpc-health-check -h localhost -p 4000"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  dagster_webserver:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile.dagster-host
    image: voz-dagster-host:latest
    restart: unless-stopped
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "/dagster_home/workspace.yaml"]
    ports:
      - 3000:3000
    env_file:
      - ./.env
    volumes:
      - ./workspace.docker.yaml:/dagster_home/workspace.yaml:ro
      - ./dagster.docker.yaml:/dagster_home/dagster.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - voz_net
      - traefik-public
    depends_on:
      postgres:
        condition: service_healthy
      user_code:
        condition: service_healthy

  dagster_daemon:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile.dagster-host
    image: voz-dagster-host:latest
    restart: unless-stopped
    command: ["dagster-daemon", "run", "-w", "/dagster_home/workspace.yaml"]
    env_file:
      - ./.env
    environment:
      - DAGSTER_DAEMON_LOG_LEVEL=DEBUG
    volumes:
      - ./workspace.docker.yaml:/dagster_home/workspace.yaml:ro
      - ./dagster.docker.yaml:/dagster_home/dagster.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - voz_net
    depends_on:
      postgres:
        condition: service_healthy
      user_code:
        condition: service_healthy
